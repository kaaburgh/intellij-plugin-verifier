name: Verifier Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Timing runs per measurement"
        required: false
        default: "5"

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build verifier
        run: ./gradlew :intellij-plugin-verifier:verifier-cli:shadowJar

      - name: Generate corpus
        run: python3 bench/gen.py --out bench/work/corpus

      - name: Run benchmark
        run: |
          python3 bench/bench.py run --label ci --runs "${{ github.event.inputs.runs || '5' }}"

      - name: Publish summary
        if: always()
        run: |
          {
            echo '## Verifier benchmark (median)'
            echo '```json'
            python3 -c "import json;print(json.dumps(json.load(open('bench/work/results-ci.json'))['median'], indent=2))"
            echo '```'
            echo '## Phase attribution'
            echo '```json'
            python3 -c "import json;print(json.dumps(json.load(open('bench/work/results-ci.json'))['profile']['phases'], indent=2))"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-bench-results
          path: |
            bench/work/results-ci.json
            bench/work/run-ci/profile.jfr
          if-no-files-found: ignore
